<!-- nickanderson.us — in_header include (referenced from _site.yml).
     No-FOUC: apply the saved theme before first paint. Underscore-prefixed so
     rmarkdown::render_site() does NOT copy it into docs/ (it is read by pandoc
     at render time only). -->

<!-- Favicon (D4 identity): self-contained inline SVG monogram, no external asset. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23640000'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='17' fill='white' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">

<script>
  (function () {
    try {
      var t = localStorage.getItem("ark-theme");
      if (t === "dark" || t === "light") {
        document.documentElement.setAttribute("data-theme", t);
      }
    } catch (e) { /* ignore; system preference applies via CSS @media */ }
  })();
</script>
